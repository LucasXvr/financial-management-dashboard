<section class="auth-page">
  <form class="auth-card" [formGroup]="registerForm" (ngSubmit)="submit()">
    <h1>Criar Conta</h1>
    <p>Cadastre-se para usar o dashboard financeiro.</p>

    <label for="name">Nome</label>
    <input id="name" type="text" formControlName="name" placeholder="Seu nome" />

    <label for="email">Email</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      placeholder="voce@empresa.com"
    />

    <label for="password">Senha</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      placeholder="********"
    />

    <label for="confirmPassword">Confirmar senha</label>
    <input
      id="confirmPassword"
      type="password"
      formControlName="confirmPassword"
      placeholder="********"
    />

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Criando conta...' : 'Criar conta' }}
    </button>

    <div class="auth-links">
      <a routerLink="/">Voltar para pagina inicial</a>
      <span>
        Ja tem conta?
        <a routerLink="/login">Entrar</a>
      </span>
    </div>
  </form>
</section>
